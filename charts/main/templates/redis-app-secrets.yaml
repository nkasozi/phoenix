{{- if .Values.redis.enabled }}
{{- if or .Values.redis.useManaged (not .Values.redis.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: redis-app-secrets
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: shared-cache
type: Opaque
stringData:
{{- if .Values.redis.useManaged }}
  # Managed Redis URLs
  REDIS_URL: {{ .Values.redis.managedUrl | quote }}
  SUPERSET_REDIS_URL: {{ printf "%s/%d" .Values.redis.managedUrl (int .Values.redis.databases.superset) | quote }}
  PREFECT_REDIS_URL: {{ printf "%s/%d" .Values.redis.managedUrl (int .Values.redis.databases.prefect) | quote }}
  # Prefect server Redis messaging (injected via extraEnvVarsSecret)
  PREFECT_REDIS_MESSAGING_PASSWORD: {{ .Values.redis.auth.password | quote }}
  PREFECT_SERVER_DOCKET_URL: {{ printf "%s/%d" .Values.redis.managedUrl (int .Values.redis.databases.prefect) | quote }}
{{- else }}
  # Self-managed Redis URLs (password from values)
  REDIS_URL: {{ printf "redis://:%s@%s-redis:6379" .Values.redis.auth.password .Release.Name | quote }}
  SUPERSET_REDIS_URL: {{ printf "redis://:%s@%s-redis:6379/%d" .Values.redis.auth.password .Release.Name (int .Values.redis.databases.superset) | quote }}
  PREFECT_REDIS_URL: {{ printf "redis://:%s@%s-redis:6379/%d" .Values.redis.auth.password .Release.Name (int .Values.redis.databases.prefect) | quote }}
  # Prefect server Redis messaging (injected via extraEnvVarsSecret)
  PREFECT_REDIS_MESSAGING_PASSWORD: {{ .Values.redis.auth.password | quote }}
  PREFECT_SERVER_DOCKET_URL: {{ printf "redis://:%s@%s-redis:6379/%d" .Values.redis.auth.password .Release.Name (int .Values.redis.databases.prefect) | quote }}
{{- end }}
{{- end }}
{{- end }}
