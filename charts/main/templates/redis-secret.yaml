{{- if and .Values.redis.enabled (not .Values.redis.useManaged) (not .Values.redis.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-redis
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: shared-cache
type: Opaque
stringData:
  REDIS_PASSWORD: {{ .Values.redis.auth.password | quote }}
  # 'password' key used by Superset extraEnvRaw to inject REDIS_PASSWORD env var
  password: {{ .Values.redis.auth.password | quote }}
{{- end }}
