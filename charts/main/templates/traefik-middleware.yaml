{{- if .Values.traefik_ingress }}
{{- $root := . -}}
{{- $insecureAddress := printf "http://%s-api-service.%s.svc.cluster.local/oauth2/insecure_auth" .Release.Name .Release.Namespace -}}
{{- range $key, $cfg := .Values.traefik_forward_auth }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ if eq $key "default" }}{{ $root.Release.Name }}-forward-auth{{ else }}{{ $root.Release.Name }}-{{ $key }}-forward-auth{{ end }}
  namespace: {{ $root.Release.Namespace }}
spec:
  forwardAuth:
    {{- if $root.Values.use_local_insecure_auth }}
    address: {{ $insecureAddress | quote }}
    {{- else }}
    address: {{ tpl $cfg.address $root | quote }}
    {{- end }}
    trustForwardHeader: {{ default true $cfg.trustForwardHeader }}
    authResponseHeaders:
      {{- range $cfg.authResponseHeaders }}
      - {{ . }}
      {{- end }}
{{- end }}
{{- end }}
