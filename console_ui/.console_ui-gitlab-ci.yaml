###
# Console CI
#
# Shared aspects of this CI are in .gitlab-ci.yml (root directory)

#####
# Rules that run console_ui jobs only when console_ui code has changed.
# Also runs jobs if the pipeline is triggered by a tag or a protected branch,
# matching the parent workflow behaviour in .gitlab-ci.yml.
.console_ui_only_workflow: &console_ui_only_workflow
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - console_ui/**/*
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_REF_PROTECTED == "true"

# Run linting for console_ui
console_ui_linting:
  image: node:21.6.2
  stage: test
  script:
    - cd console_ui/
    - npm install
    - npm run lint
  <<: *console_ui_only_workflow
  needs: []

# Test the build of the console_ui
# This matches the build in AWS Amplify
console_ui_build:
  image: node:21.6.2
  stage: build
  script:
    - cd console_ui/
    - npm ci --cache .npm --prefer-offline
    - npm run build
  <<: *console_ui_only_workflow
  needs: []
